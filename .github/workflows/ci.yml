name: CI - TDD + BDD + ATDD

on:
  push:
    branches: [ "main", "estudiantes" ]
  pull_request:
    branches: [ "main", "estudiantes" ]

jobs:

  test-java:
    name: TDD + BDD (Maven)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run TDD + BDD tests
        run: mvn -B test --file pom.xml

      - name: Upload Serenity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: target/site/serenity/

  test-playwright:
    name: ATDD (Playwright)
    runs-on: ubuntu-latest
    needs: test-java

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bookingya
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start Spring Boot app
        run: |
          mvn -B spring-boot:run \
            -Dspring-boot.run.jvmArguments="-Dspring.datasource.url=jdbc:postgresql://localhost:5432/bookingya -Dspring.datasource.username=postgres -Dspring.datasource.password=postgres" \
            &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/api/reservation > /dev/null 2>&1; then
              echo "App is up"
              break
            fi
            sleep 3
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: playwright-tests
        run: npm install

      - name: Install Playwright browsers
        working-directory: playwright-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright-tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
